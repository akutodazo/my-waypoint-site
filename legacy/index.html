<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ウェイポイントルート作成</title>

    <!-- Leaflet本体（地図） -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet.draw（描画プラグイン） -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

  <!-- Turf.js（地理計算） -->
  <script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>

  <!-- JSZip（KMZ=ZIPの読み書き） -->
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- 地図表示の箱CSSで高さ指定-->
  <div id="map" style="height: 70vh;"></div>

  <!-- パラメーター入力フォーム -->
  <div id="container">
     <label>高度(m): <input id="height" type="number" value="50"></label>
    <label>速度(m/s): <input id="speed" type="number" value="5"></label>
    <label>進行方向の重なり(%): <input id="front" type="number" value="80"></label>
    <label>横方向の重なり(%): <input id="side" type="number" value="70"></label>
    <button id="generate">ルート生成</button>
    <button id="download">KMZダウンロード</button>
  </div>

    <!-- 自分のコード -->
  <script src="js/map.js"></script>
  <script src="js/route.js"></script>
  <script src="js/Turf.js"></script>
  <script src="js/kmz.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
